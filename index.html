<head>

<title>Minha Biblioteca Kindle</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f7f4ef;--ink:#241f1a;--muted:#8a8178;--line:#e4ddd2;
    --card:#fffdf9;--spine:#b8532e;--spine-soft:#e8d5c8;--shadow:rgba(60,45,30,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:32px 24px 80px}
  header{margin-bottom:24px}
  .eyebrow{font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:900;font-size:clamp(34px,6vw,54px);line-height:0.98;letter-spacing:-0.02em;margin-bottom:4px}
  h1 .accent{color:var(--spine);font-style:italic}
  .sub{color:var(--muted);font-size:15px}
  .stats{display:flex;gap:14px;flex-wrap:wrap;margin-top:22px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 20px;flex:1;min-width:140px;box-shadow:0 2px 8px var(--shadow)}
  .stat-num{font-family:'Fraunces',Georgia,serif;font-size:32px;font-weight:900;line-height:1;letter-spacing:-0.02em}
  .stat-num .accent{color:var(--spine)}
  .stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:6px;font-weight:600}
  .stat.wide{flex:2;min-width:240px}
  .top-list{display:flex;flex-direction:column;gap:5px;margin-top:4px}
  .top-row{display:flex;align-items:center;gap:8px;font-size:13px}
  .top-row .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .top-bar{height:6px;background:var(--spine-soft);border-radius:99px;overflow:hidden;width:70px;flex-shrink:0}
  .top-bar span{display:block;height:100%;background:var(--spine);border-radius:99px}
  .top-row .ct{font-variant-numeric:tabular-nums;color:var(--muted);width:20px;text-align:right;font-weight:600}
  .controls{display:flex;gap:12px;flex-wrap:wrap;margin:28px 0 16px;align-items:center}
  .search{flex:1;min-width:200px;position:relative}
  .search input{width:100%;padding:12px 14px 12px 40px;border:1px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;background:var(--card);color:var(--ink)}
  .search input:focus{outline:2px solid var(--spine);outline-offset:-1px;border-color:transparent}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
  select{padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;background:var(--card);color:var(--ink);cursor:pointer}
  .sortseg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--card)}
  .sortseg button{border:none;background:none;padding:11px 15px;font-family:inherit;font-size:14px;cursor:pointer;color:var(--muted);font-weight:500}
  .sortseg button.on{background:var(--ink);color:var(--paper)}
  .meta-line{font-size:13px;color:var(--muted);margin-bottom:20px}
  .author-group{margin-bottom:26px}
  .author-head{display:flex;align-items:baseline;gap:12px;padding-bottom:8px;margin-bottom:12px;border-bottom:1px solid var(--line)}
  .author-name{font-family:'Fraunces',Georgia,serif;font-size:20px;font-weight:600;letter-spacing:-0.01em}
  .author-tally{font-size:12px;background:var(--spine-soft);color:#8a3d1f;padding:2px 9px;border-radius:99px;font-weight:600}
  .books{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
  .book{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:var(--card);border:1px solid var(--line);border-radius:11px;transition:.15s}
  .book:hover{border-color:var(--spine);box-shadow:0 3px 12px var(--shadow)}
  .spine{width:4px;align-self:stretch;border-radius:99px;background:var(--spine);flex-shrink:0;opacity:.5}
  .book-title{font-size:14.5px;line-height:1.35;flex:1}
  .book-author-inline{font-size:12px;color:var(--muted);margin-top:2px}
  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty-title{font-family:'Fraunces',Georgia,serif;font-size:22px;color:var(--ink);margin-bottom:6px}
  footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);text-align:center}
  @media (max-width:620px){
    .wrap{padding:24px 16px 60px}
    .controls{gap:8px}
    .search{flex-basis:100%;min-width:0}
    select{flex:1;min-width:0}
    .sortseg{flex:1}
    .sortseg button{flex:1}
    .stat{min-width:calc(50% - 7px)}
    .stat.wide{min-width:100%}
    .books{grid-template-columns:1fr}
  }
</style>
</head>

function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function render(){
  const q=norm(qEl.value.trim()); const author=authSel.value;
  let items=BOOKS.filter(b=>{
    if(author && b.author!==author) return false;
    if(q && !(norm(b.title).includes(q)||norm(b.author).includes(q))) return false;
    return true;
  });
  metaEl.textContent = items.length+' '+(items.length===1?'título':'títulos');
  if(!items.length){listEl.innerHTML='<div class="empty"><div class="empty-title">Nada por aqui</div><div>Tente outro termo ou limpe os filtros.</div></div>';return;}
  if(sortMode==='title'){
    const sorted=[...items].sort((a,b)=>norm(a.title).localeCompare(norm(b.title),'pt'));
    metaEl.textContent+=' · ordenados por título';
    listEl.innerHTML='<div class="books">'+sorted.map(b=>`<div class="book"><span class="spine"></span><span><span class="book-title">${esc(b.title)}</span><div class="book-author-inline">${esc(b.author)}</div></span></div>`).join('')+'</div>';
    return;
  }
  const groups={};
  items.forEach(b=>{(groups[b.author]=groups[b.author]||[]).push(b)});
  const authors=Object.keys(groups).sort((a,b)=>a.localeCompare(b,'pt'));
  metaEl.textContent+=' · '+authors.length+' '+(authors.length===1?'autor':'autores');
  listEl.innerHTML=authors.map(a=>{
    const bs=groups[a].sort((x,y)=>norm(x.title).localeCompare(norm(y.title),'pt'));
    return `<div class="author-group"><div class="author-head"><span class="author-name">${esc(a)}</span><span class="author-tally">${bs.length}</span></div><div class="books">${bs.map(b=>`<div class="book"><span class="spine"></span><span class="book-title">${esc(b.title)}</span></div>`).join('')}</div></div>`;
  }).join('');
}
qEl.addEventListener('input',render);
authSel.addEventListener('change',render);
$('#sortSeg').addEventListener('click',e=>{const btn=e.target.closest('button');if(!btn)return;sortMode=btn.dataset.s;[...$('#sortSeg').children].forEach(b=>b.classList.toggle('on',b===btn));render();});
render();
</script>
</body>
</html>
